basePath: /api/v1
host: localhost:8080
info:
  contact:
    name: API Support
    url: http://github.com/404nfidv2/go-nuxt-starter-kit
  description: REST API for the Go-Nuxt Starter Kit (auth, profile, notifications,
    admin).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go-Nuxt Starter Kit API
  version: "1.0"
paths: {}
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the access token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
