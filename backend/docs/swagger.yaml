    patch:
      consumes:
      - application/json
      parameters:
      - description: Fields to update
        in: body
        name: body
        schema:
          properties:
            bio:
              type: string
            display_name:
              type: string
            first_name:
              type: string
            last_name:
              type: string
          type: object
      produces:
