          description: OK
          schema:
            properties:
              db:
                type: string
              redis:
                type: string
              status:
                type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            properties:
              db:
                type: string
              redis:
                type: string
              status:
                type: string
            type: object
      summary: Health check — pings DB and Redis
      tags:
      - system
  /notifications:
