<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Subject}}</title>
  <style>
    body { margin:0; padding:0; background:#f4f4f5; font-family:sans-serif; color:#18181b; }
    .wrap { max-width:560px; margin:40px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .header { background:#18181b; padding:24px 32px; }
    .header h1 { margin:0; color:#fff; font-size:20px; }
    .body { padding:32px; }
    .body p { margin:0 0 16px; line-height:1.6; font-size:15px; }
    .btn { display:inline-block; padding:12px 24px; background:#18181b; color:#fff !important; text-decoration:none; border-radius:6px; font-size:15px; font-weight:600; margin:8px 0 16px; }
    .footer { padding:16px 32px; background:#f4f4f5; font-size:12px; color:#71717a; text-align:center; }
    .footer a { color:#71717a; }
    hr { border:none; border-top:1px solid #e4e4e7; margin:24px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header"><h1>{{.AppName}}</h1></div>
    <div class="body">
      {{.Content}}
    </div>
    <div class="footer">
      &copy; {{.AppName}} &bull; You received this email because an action was taken on your account.<br/>
      If you did not request this, you can safely ignore this email.
    </div>
  </div>
</body>
</html>
